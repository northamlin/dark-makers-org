apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dark-makers-org.fullname" . }}-strapi
  namespace: dark-makers
  labels:
    {{- include "dark-makers-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: strapi
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dark-makers-org.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: strapi
  template:
    metadata:
      labels:
        {{- include "dark-makers-org.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: strapi
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: fix-uploads-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /opt/app/public/uploads"]
          volumeMounts:
            - name: uploads
              mountPath: /opt/app/public/uploads
      containers:
        - name: strapi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 1337
          envFrom:
            - secretRef:
                name: {{ include "dark-makers-org.fullname" . }}
          volumeMounts:
            - name: uploads
              mountPath: /opt/app/public/uploads
          readinessProbe:
            httpGet:
              path: /_health
              port: 1337
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_health
              port: 1337
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "dark-makers-org.fullname" . }}-uploads
